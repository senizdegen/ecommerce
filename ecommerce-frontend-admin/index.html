<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopAdmin</title>
  <link rel="stylesheet" href="/src/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-900 text-white">

  <!-- Mobile top bar (hidden on lg+, hidden on login) -->
  <header id="mobile-header" class="lg:hidden fixed top-0 inset-x-0 z-50 h-14 bg-slate-900 border-b border-slate-800 flex items-center px-4 gap-3">
    <button id="sidebar-toggle" class="text-gray-400 hover:text-white p-1.5 rounded-lg hover:bg-slate-800 transition-colors" aria-label="Toggle menu">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <a href="#/" class="flex items-center gap-2">
      <svg width="28" height="28" viewBox="0 0 34 34" fill="none" class="flex-shrink-0">
        <rect width="34" height="34" rx="9" fill="#ef4444"/>
        <path d="M11 15V12.5a6 6 0 0112 0V15" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <rect x="7" y="15" width="20" height="13" rx="3" fill="white"/>
        <path d="M20 21.5c0-.9-.9-1.5-3-1.5s-3 .6-3 1.5.9 1.1 3 1.6c2.1.5 3 .7 3 1.6s-.9 1.3-3 1.3-3-.7-3-1.5" stroke="#ef4444" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="text-white text-sm font-bold tracking-tight">Shop<span class="text-red-400">ify</span></span>
    </a>
  </header>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden"></div>

  <!-- Main layout -->
  <div class="flex h-screen overflow-hidden">
    <div id="sidebar-container" class="flex-shrink-0 h-screen"></div>
    <div id="main-content" class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto pt-14 lg:pt-0">
      <div id="app" class="flex-1 p-4 sm:p-5 lg:p-6 bg-gray-900"></div>
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>
  <div id="modal-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
